onboarding = false

[terminal]
# Executable for new interactive panes. Empty falls back to $SHELL — which is
# /bin/sh (or bash) on a server, not zsh — so set it explicitly so every new
# workspace/tab opens zsh regardless of the login shell. MUST live under
# [terminal]: at the top level herdr silently ignores it and falls back to
# $SHELL (this masked the bug on macOS, where $SHELL is already zsh). Bare "zsh"
# resolves on PATH (/bin/zsh on macOS, /usr/bin/zsh on Linux); ~/.zshenv +
# ~/.zshrc load as for any interactive zsh.
default_shell = "zsh"

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true

agent_panel_scope = "all"
[experimental]
switch_ascii_input_source_in_prefix = true
